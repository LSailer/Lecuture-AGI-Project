name: Run Dev on BVUni Cluster

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
    types: [closed]

env:
  REPO_PATH: /pfs/data6/home/ul/ul_student/ul_hfj15/Lecuture-AGI-Project

jobs:
  submit-slurm-job:
    runs-on: self-hosted
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      # Step 1: Checkout handles GitHub authentication automatically
      - name: Checkout code (for auth)
        uses: actions/checkout@v4
        with:
          ref: dev

      # Step 2: Sync the checked-out code into the existing repo folder
      # Preserves .env, LLM/model/, .venv/, and other local-only files
      - name: Sync code to project folder
        run: |
          rsync -a --delete \
            --exclude '.env' \
            --exclude 'LLM/model/' \
            --exclude '.venv/' \
            --exclude 'logs/' \
            --exclude 'output/' \
            --exclude '__pycache__/' \
            --exclude 'webapp/node_modules/' \
            $GITHUB_WORKSPACE/ ${{ env.REPO_PATH }}/
          echo "Code synced to ${{ env.REPO_PATH }}"

      # Step 3: Submit the SLURM job from the project folder
      - name: Submit SLURM job
        working-directory: ${{ env.REPO_PATH }}
        run: |
          mkdir -p logs
          job_id=$(sbatch --parsable scripts/dev.sh)
          echo "Submitted SLURM job: $job_id"
          echo "JOB_ID=$job_id" >> $GITHUB_ENV

      # Step 4: Wait for SLURM job and print logs
      - name: Wait for job and report
        working-directory: ${{ env.REPO_PATH }}
        run: |
          echo "Waiting for SLURM job $JOB_ID to finish..."

          while squeue -j $JOB_ID -h 2>/dev/null | grep -q "$JOB_ID"; do
            echo "Job $JOB_ID still running — checking again in 5 minutes..."
            sleep 300
          done

          echo "Job $JOB_ID finished."

          OUT_FILE="logs/slurm-${JOB_ID}.out"
          ERR_FILE="logs/slurm-${JOB_ID}.err"

          if [ -f "$OUT_FILE" ]; then
            echo "--- SLURM Output (slurm-${JOB_ID}.out) ---"
            cat "$OUT_FILE"
          else
            echo "No output file found at $OUT_FILE"
          fi

          if [ -f "$ERR_FILE" ]; then
            echo "--- SLURM Errors (slurm-${JOB_ID}.err) ---"
            cat "$ERR_FILE"
          else
            echo "No error file found at $ERR_FILE"
          fi

          EXIT_CODE=$(sacct -j $JOB_ID --format=ExitCode --noheader | head -1 | cut -d':' -f1 | tr -d ' ')
          echo "Job exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ] && [ -n "$EXIT_CODE" ]; then
            echo "Job failed with exit code $EXIT_CODE"
            exit 1
          else
            echo "Job completed successfully."
          fi
