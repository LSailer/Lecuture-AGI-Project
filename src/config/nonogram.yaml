game: nonogram
margin_k: 2
max_steps: 500
max_agents_per_step: 12
output_dir: output
temperature: 0.5
model_path: LLM/models/devstral-24b
prompt_variant: overlap_v14

# Fallback config
max_fallback_retries: 3
fallback_api: local
fallback_local_model: LLM/model
gemini_model: gemini-2.5-flash

