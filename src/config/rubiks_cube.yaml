game: rubiks_cube
margin_k: 3
max_steps: 2000
max_agents_per_step: 9
output_dir: output
temperature: 0.1
temp_escalation: false
model_path: LLM/models/qwen3-32b
prompt_variant: qwen3_compact_40

# Game-specific — 40-move scramble
scramble:
  - R
  - U
  - "R'"
  - "U'"
  - F2
  - D
  - L
  - "B'"
  - U2
  - R
  - "D'"
  - F
  - B2
  - "L'"
  - R2
  - U
  - B
  - "L'"
  - F
  - "D'"
  - "R'"
  - U2
  - B2
  - "D'"
  - L2
  - F
  - U2
  - "R'"
  - "L'"
  - D
  - B
  - "U'"
  - "F'"
  - R2
  - U2
  - "B'"
  - L
  - "F'"
  - R2
  - "D'"

forbid_undo: true
max_score_drop: 6

# Cycle detection
max_state_revisits: 3

# Fallback config
max_fallback_retries: 3
fallback_api: gemini
gemini_model: gemini-2.5-flash
