game: rubiks_cube
margin_k: 1
max_steps: 2000
max_agents_per_step: 3
output_dir: output
temperature: 0.1
voting_temperature: 0.1
voting_top_p: 0.95
temp_escalation: false
model_path: LLM/models/devstral-24b
prompt_variant: devstral_face_v28

# Game-specific — 1-move scramble [R]; correct solution = [R'] in 1 step; v28 example = exact [R]-state
scramble:
  - R

forbid_undo: true
max_score_drop: 50

# Cycle detection
max_state_revisits: 3

