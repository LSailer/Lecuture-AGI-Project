game: rubiks_cube
margin_k: 3
max_steps: 2000
max_agents_per_step: 9
output_dir: output
temperature: 0.1
temp_escalation: false
model_path: LLM/models/devstral-24b
prompt_variant: base

# Game-specific — 5-move scramble
scramble:
  - R
  - U
  - R'
  - U'
  - F2

forbid_undo: true
max_score_drop: 6

# Cycle detection
max_state_revisits: 3

# Fallback config
max_fallback_retries: 3
fallback_api: gemini
gemini_model: gemini-2.5-flash
