game: rubiks_cube
margin_k: 3
max_steps: 100
max_agents_per_step: 9
output_dir: output
temperature: 0.1
temp_escalation: false
model_path: LLM/models/devstral-24b
prompt_variant: lookup_v3

# Game-specific — 2-move scramble (baseline difficulty)
scramble:
  - R
  - U

forbid_undo: true
max_score_drop: 6

# Cycle detection
max_state_revisits: 3

# Fallback config
max_fallback_retries: 3
fallback_api: gemini
gemini_model: gemini-2.5-flash
