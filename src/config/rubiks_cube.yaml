game: rubiks_cube
margin_k: 1
max_steps: 2000
max_agents_per_step: 3
output_dir: output
temperature: 0.1
voting_temperature: 0.1
voting_top_p: 0.95
temp_escalation: false
model_path: LLM/models/devstral-24b
prompt_variant: devstral_face_v24

# Game-specific — 2-move scramble [U,U]=U2; correct solution = [U',U'] in 2 steps (model U'-bias = correct)
scramble:
  - U
  - U

forbid_undo: true
max_score_drop: 50

# Cycle detection
max_state_revisits: 3

