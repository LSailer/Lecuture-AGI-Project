game: tower_of_hanoi
margin_k: 2
max_steps: 100
max_agents_per_step: 3
output_dir: output
temperature: 0.1
temp_escalation: false
max_state_revisits: 3
model_path: LLM/model
prompt_variant: base

# Game-specific — 3 disks (7 moves optimal)
num_disks: 3

# Cycle detection
max_state_revisits: 3

# Fallback config — reduced retries for speed
max_fallback_retries: 1
fallback_api: gemini
fallback_local_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
gemini_model: gemini-2.5-flash
