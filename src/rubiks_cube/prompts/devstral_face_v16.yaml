system_prompt: |
  Rubik's Cube solver. 54-char state: W/R/G/Y/O/B.
  Faces: U=s[0:9] R=s[9:18] F=s[18:27] D=s[27:36] L=s[36:45] B=s[45:54].
  Face rows: row0=F[0:3] row1=F[3:6] row2=F[6:9]. Face cols: col0=F[0]F[3]F[6] col2=F[2]F[5]F[8].
  Solved: {solved_state}

  FACE ROTATION — expand face to F[0..8], then build new face 3 chars at a time:
    CCW of U/R/D/L, or CW of F/B:  r0=F[6]F[3]F[0]  r1=F[7]F[4]F[1]  r2=F[8]F[5]F[2]
    CW  of U/R/D/L, or CCW of F/B: r0=F[2]F[5]F[8]  r1=F[1]F[4]F[7]  r2=F[0]F[3]F[6]
    X2:                             r0=F[8]F[7]F[6]  r1=F[5]F[4]F[3]  r2=F[2]F[1]F[0]

  EDGE CYCLES (A→B: new row/col of B = old row/col of A; (rev)=reversed 3 chars):
  R CW:  R-face CW;  U-col2→F-col2→D-col2→B-col0(rev)
  R' CCW: R-face CCW; F-col2→U-col2→B-col0(rev)→D-col2
  U CW:  U-face CW;  F-row0→R-row0→B-row0→L-row0
  U' CCW: U-face CCW; R-row0→F-row0→L-row0→B-row0
  F CW:  F-face CW;  U-row2→R-col0→D-row0(rev)→L-col2(rev)
  F' CCW: F-face CCW; R-col0→U-row2→L-col2(rev)→D-row0(rev)
  D CW:  D-face CW;  R-row2→F-row2→L-row2→B-row2
  D' CCW: D-face CCW; F-row2→R-row2→B-row2→L-row2
  L CW:  L-face CW;  F-col0→U-col0→B-col2(rev)→D-col0
  L' CCW: L-face CCW; U-col0→F-col0→D-col0→B-col2(rev)
  B CW:  B-face CW;  R-col2(rev)→U-row0→L-col0(rev)→D-row2
  B' CCW: B-face CCW; U-row0→R-col2(rev)→D-row2→L-col0(rev)

  ASSEMBLY RULE: for each new face write 3 rows of exactly 3 chars, then concatenate.
  For a row-updated face (edge replaces full row0): r0=edge[3c]  r1=X[3:6](expand)  r2=X[6:9](expand)
  For an unchanged face: r0=X[0:3](expand)  r1=X[3:6](expand)  r2=X[6:9](expand)
  For a col-updated face (col2 edge e0,e1,e2): r0=X[0]X[1]+e0  r1=X[3]X[4]+e1  r2=X[6]X[7]+e2
  For a col-updated face (col0 edge e0,e1,e2): r0=e0+X[1]X[2]  r1=e1+X[4]X[5]  r2=e2+X[7]X[8]
  Notation X[a:b] means chars at positions a,a+1,...,b-1 from expand_X (3 consecutive chars).

  EXAMPLE — move U' on BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  Faces: U=BBB/WWW/WWW R=GGW/RRR/RRR F=OOO/GGW/GGW D=YYG/YYG/YYG L=YBB/OOO/OOO B=RRR/YBB/YBB
  expand U: F[0]=B F[1]=B F[2]=B F[3]=W F[4]=W F[5]=W F[6]=W F[7]=W F[8]=W
  expand R: F[0]=G F[1]=G F[2]=W F[3]=R F[4]=R F[5]=R F[6]=R F[7]=R F[8]=R
  expand F: F[0]=O F[1]=O F[2]=O F[3]=G F[4]=G F[5]=W F[6]=G F[7]=G F[8]=W
  expand D: F[0]=Y F[1]=Y F[2]=G F[3]=Y F[4]=Y F[5]=G F[6]=Y F[7]=Y F[8]=G
  expand L: F[0]=Y F[1]=B F[2]=B F[3]=O F[4]=O F[5]=O F[6]=O F[7]=O F[8]=O
  expand B: F[0]=R F[1]=R F[2]=R F[3]=Y F[4]=B F[5]=B F[6]=Y F[7]=B F[8]=B
  edge U' (R-row0→F-row0→L-row0→B-row0): R=GGW F=OOO L=YBB B=RRR → new_R_r0=RRR new_F_r0=GGW new_L_r0=OOO new_B_r0=YBB
  face U CCW: r0=F[6]F[3]F[0]=W,W,B=WWB  r1=F[7]F[4]F[1]=W,W,B=WWB  r2=F[8]F[5]F[2]=W,W,B=WWB  → new_U=WWBWWBWWB
  new_R: r0=RRR(edge)  r1=R[3:6]=RRR  r2=R[6:9]=RRR  → new_R=RRRRRRRRR
  new_F: r0=GGW(edge)  r1=F[3:6]=GGW  r2=F[6:9]=GGW  → new_F=GGWGGWGGW
  new_D: r0=D[0:3]=YYG  r1=D[3:6]=YYG  r2=D[6:9]=YYG  → new_D=YYGYYGYYG
  new_L: r0=OOO(edge)  r1=L[3:6]=OOO  r2=L[6:9]=OOO  → new_L=OOOOOOOOO
  new_B: r0=YBB(edge)  r1=B[3:6]=YBB  r2=B[6:9]=YBB  → new_B=YBBYBBYBB
  new_state_parts: WWBWWBWWB RRRRRRRRR GGWGGWGGW YYGYYGYYG OOOOOOOOO YBBYBBYBB
  move = U'
  next_state = WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

user_prompt: |
  Step:{step} Score:{score} Prev:{previous_move}
  Allowed:{allowed_moves}
  State:{current_state}
  Faces: {parsed_faces}

  RESPOND WITH ONLY THIS FORMAT (no preamble, no extra text):
  expand U: F[0]=[c] F[1]=[c] F[2]=[c] F[3]=[c] F[4]=[c] F[5]=[c] F[6]=[c] F[7]=[c] F[8]=[c]
  expand R: F[0]=[c] F[1]=[c] F[2]=[c] F[3]=[c] F[4]=[c] F[5]=[c] F[6]=[c] F[7]=[c] F[8]=[c]
  expand F: F[0]=[c] F[1]=[c] F[2]=[c] F[3]=[c] F[4]=[c] F[5]=[c] F[6]=[c] F[7]=[c] F[8]=[c]
  expand D: F[0]=[c] F[1]=[c] F[2]=[c] F[3]=[c] F[4]=[c] F[5]=[c] F[6]=[c] F[7]=[c] F[8]=[c]
  expand L: F[0]=[c] F[1]=[c] F[2]=[c] F[3]=[c] F[4]=[c] F[5]=[c] F[6]=[c] F[7]=[c] F[8]=[c]
  expand B: F[0]=[c] F[1]=[c] F[2]=[c] F[3]=[c] F[4]=[c] F[5]=[c] F[6]=[c] F[7]=[c] F[8]=[c]
  edge [move] ([cycle]): [face]=[3c] ... → new_[fa]_r0=[3c] ...
  face [rotating_face] [dir]: r0=[3c]  r1=[3c]  r2=[3c]  → new_[face]=[9c]
  new_R: r0=[3c]  r1=[3c]  r2=[3c]  → new_R=[9c]
  new_F: r0=[3c]  r1=[3c]  r2=[3c]  → new_F=[9c]
  new_D: r0=[3c]  r1=[3c]  r2=[3c]  → new_D=[9c]
  new_L: r0=[3c]  r1=[3c]  r2=[3c]  → new_L=[9c]
  new_B: r0=[3c]  r1=[3c]  r2=[3c]  → new_B=[9c]
  new_state_parts: [9c] [9c] [9c] [9c] [9c] [9c]  (copy new_U new_R new_F new_D new_L new_B each verbatim)
  move = <token>
  next_state = [54c]  (new_state_parts without spaces; exactly 54 chars)
