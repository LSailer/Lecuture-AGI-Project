system_prompt: |
  Rubik's Cube solver. 54-char state: W/R/G/Y/O/B.
  Faces: U=s[0:9] R=s[9:18] F=s[18:27] D=s[27:36] L=s[36:45] B=s[45:54].
  Face[r][c]=s[start+r*3+c]. Col-c of face: s0+c, s0+3+c, s0+6+c.
  Solved: {solved_state}

  FACE ROTATION (new[r][c]=):
    U,D,R,L CW: old[c][2-r]   U,D,R,L CCW: old[2-c][r]
    F,B CW: old[2-c][r]        F,B CCW: old[c][2-r]
    X2: apply CW twice.

  EDGE CYCLES (Aâ†’B: new_B=old_A; (rev)=reversed 0â†”2):
  R CW:  R CW; U-col2â†’F-col2â†’D-col2â†’B-col0(rev)â†’U-col2
  R' CCW: R CCW; F-col2â†’U-col2â†’B-col0(rev)â†’D-col2â†’F-col2
  U CW:  U CW; F-row0â†’R-row0â†’B-row0â†’L-row0â†’F-row0
  U' CCW: U CCW; R-row0â†’F-row0â†’L-row0â†’B-row0â†’R-row0
  F CW:  F CW; U-row2â†’R-col0â†’D-row0(rev)â†’L-col2(rev)â†’U-row2
  F' CCW: F CCW; R-col0â†’U-row2â†’L-col2(rev)â†’D-row0(rev)â†’R-col0
  D CW:  D CW; R-row2â†’F-row2â†’L-row2â†’B-row2â†’R-row2
  D' CCW: D CCW; F-row2â†’R-row2â†’B-row2â†’L-row2â†’F-row2
  L CW:  L CW; F-col0â†’U-col0â†’B-col2(rev)â†’D-col0â†’F-col0
  L' CCW: L CCW; U-col0â†’F-col0â†’D-col0â†’B-col2(rev)â†’U-col0
  B CW:  B CW; R-col2(rev)â†’U-row0â†’L-col0(rev)â†’D-row2â†’R-col2
  B' CCW: B CCW; U-row0â†’R-col2(rev)â†’D-row2â†’L-col0(rev)â†’U-row0

  EXAMPLE â€” U' on BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  Faces: U=BBB/WWW/WWW R=GGW/RRR/RRR F=OOO/GGW/GGW D=YYG/YYG/YYG L=YBB/OOO/OOO B=RRR/YBB/YBB
  edge U' CCW (Râ†’Fâ†’Lâ†’Bâ†’R row0): R0=GGW F0=OOO L0=YBB B0=RRR â†’ new: R0=RRR F0=GGW L0=OOO B0=YBB
  face U CCW (old[2-c][r]): r0=[W,W,B]=WWB r1=[W,W,B]=WWB r2=[W,W,B]=WWB
  new_U=[WWB]+[WWB]+[WWB]=[WWBWWBWWB]
  new_R=[RRR]+[RRR]+[RRR]=[RRRRRRRRR]  (r0=edge:RRR, r1=old:RRR, r2=old:RRR)
  new_F=[GGW]+[GGW]+[GGW]=[GGWGGWGGW]  (r0=edge:GGW, r1=old:GGW, r2=old:GGW)
  new_D=[YYG]+[YYG]+[YYG]=[YYGYYGYYG]  (r0=old:YYG, r1=old:YYG, r2=old:YYG)
  new_L=[OOO]+[OOO]+[OOO]=[OOOOOOOOO]  (r0=edge:OOO, r1=old:OOO, r2=old:OOO)
  new_B=[YBB]+[YBB]+[YBB]=[YBBYBBYBB]  (r0=edge:YBB, r1=old:YBB, r2=old:YBB)
  move = U'
  next_state = WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

user_prompt: |
  Step:{step} Score:{score} Prev:{previous_move}
  Allowed:{allowed_moves}
  State:{current_state}
  Faces: {parsed_faces}

  RESPOND WITH ONLY THIS FORMAT (no preamble, no extra text):
  edge [move] ([cycle]): old [strips] â†’ new [strips]
  face [face] ([formula]): r0=[3c] r1=[3c] r2=[3c]
  new_U=[r0:3c]+[r1:3c]+[r2:3c]=[9c]
  new_R=[r0:3c]+[r1:3c]+[r2:3c]=[9c]
  new_F=[r0:3c]+[r1:3c]+[r2:3c]=[9c]
  new_D=[r0:3c]+[r1:3c]+[r2:3c]=[9c]
