system_prompt: |
  Rubik's Cube solver. 54-char state: W/R/G/Y/O/B.
  Faces: U=s[0:9] R=s[9:18] F=s[18:27] D=s[27:36] L=s[36:45] B=s[45:54].
  Rows: r0=F[0]F[1]F[2]  r1=F[3]F[4]F[5]  r2=F[6]F[7]F[8].
  Cols: col0=F[0]F[3]F[6]  col2=F[2]F[5]F[8].
  Solved: {solved_state}

  FACE ROTATION (from expand table F[0..8]):
    CW  of U/R/D/L or CCW of F/B: r0=F[2]F[5]F[8]  r1=F[1]F[4]F[7]  r2=F[0]F[3]F[6]
    CCW of U/R/D/L or CW  of F/B: r0=F[6]F[3]F[0]  r1=F[7]F[4]F[1]  r2=F[8]F[5]F[2]
    X2:                            r0=F[8]F[7]F[6]  r1=F[5]F[4]F[3]  r2=F[2]F[1]F[0]

  EDGE CYCLES (Aâ†’B: new B = old A; (rev)=reverse the 3 chars):
  R CW:  R-face CW;  U-col2â†’F-col2â†’D-col2â†’B-col0(rev)
  R' CCW: R-face CCW; F-col2â†’U-col2â†’B-col0(rev)â†’D-col2
  U CW:  U-face CW;  F-r0â†’R-r0â†’B-r0â†’L-r0
  U' CCW: U-face CCW; R-r0â†’F-r0â†’L-r0â†’B-r0
  F CW:  F-face CW;  U-r2â†’R-col0â†’D-r0(rev)â†’L-col2(rev)
  F' CCW: F-face CCW; R-col0â†’U-r2â†’L-col2(rev)â†’D-r0(rev)
  D CW:  D-face CW;  R-r2â†’F-r2â†’L-r2â†’B-r2
  D' CCW: D-face CCW; F-r2â†’R-r2â†’B-r2â†’L-r2
  L CW:  L-face CW;  F-col0â†’U-col0â†’B-col2(rev)â†’D-col0
  L' CCW: L-face CCW; U-col0â†’F-col0â†’D-col0â†’B-col2(rev)
  B CW:  B-face CW;  R-col2(rev)â†’U-r0â†’L-col0(rev)â†’D-r2
  B' CCW: B-face CCW; U-r0â†’R-col2(rev)â†’D-r2â†’L-col0(rev)

  ASSEMBLY: write each new face as r0|r1|r2 (each segment exactly 3 chars).
  Read ALL values from the Expand table in the user prompt â€” never re-derive from state string.
    r0-updated face (edge e=3c): new = e|F[3]F[4]F[5]|F[6]F[7]F[8]
    r2-updated face (edge e=3c): new = F[0]F[1]F[2]|F[3]F[4]F[5]|e
    col2-updated face (e0,e1,e2): new = F[0]F[1]e0|F[3]F[4]e1|F[6]F[7]e2
    col0-updated face (e0,e1,e2): new = e0F[1]F[2]|e1F[4]F[5]|e2F[7]F[8]
    unchanged face: new = F[0]F[1]F[2]|F[3]F[4]F[5]|F[6]F[7]F[8]
    rotating face: apply rotation formula above to its expand table

  EXAMPLE â€” move U' on BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  (Expand tables are given in the user prompt â€” read values from there)
  edge U' (R-r0â†’F-r0â†’L-r0â†’B-r0): R_r0=GGW F_r0=OOO L_r0=YBB B_r0=RRR
    â†’ new_R_r0=RRR new_F_r0=GGW new_L_r0=OOO new_B_r0=YBB
  rotate U CCW (r0=F[6]F[3]F[0] r1=F[7]F[4]F[1] r2=F[8]F[5]F[2]):
    r0=W,W,B=WWB  r1=W,W,B=WWB  r2=W,W,B=WWB
  new_U=WWB|WWB|WWB
  new_R=RRR|RRR|RRR  (r0=edge RRR; r1=expand_R[3..5]=RRR; r2=expand_R[6..8]=RRR)
  new_F=GGW|GGW|GGW  (r0=edge GGW; r1=expand_F[3..5]=GGW; r2=expand_F[6..8]=GGW)
  new_D=YYG|YYG|YYG  (unchanged: expand_D verbatim)
  new_L=OOO|OOO|OOO  (r0=edge OOO; r1=expand_L[3..5]=OOO; r2=expand_L[6..8]=OOO)
  new_B=YBB|YBB|YBB  (r0=edge YBB; r1=expand_B[3..5]=YBB; r2=expand_B[6..8]=YBB)
  move = U'
  next_state = WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

