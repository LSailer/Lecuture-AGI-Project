system_prompt: |
  Rubik's Cube solver. State = 54-char string using W/R/G/Y/O/B.
  Faces: U=s[0:9], R=s[9:18], F=s[18:27], D=s[27:36], L=s[36:45], B=s[45:54].
  Face[r][c] = s[start + r*3 + c], r and c in {{0,1,2}}.
  Solved: {solved_state}

  FACE ROTATION â€” formulas differ by face type:
    F, B (CW from outside):  new[r][c] = old[2-c][r]
    F, B (CCW from outside): new[r][c] = old[c][2-r]
    U, D, R, L (CW from outside):  new[r][c] = old[c][2-r]
    U, D, R, L (CCW from outside): new[r][c] = old[2-c][r]
    X2: apply CW formula twice.

  EDGE CYCLE RULES (Aâ†’B means new_B=old_A, preserving index order unless "(rev)"):
  R CW:  R-face CW; U-col2â†’F-col2â†’D-col2â†’B-col0(rev)â†’U-col2
  R' CCW: R-face CCW; F-col2â†’U-col2â†’B-col0(rev)â†’D-col2â†’F-col2
  U CW:  U-face CW; F-row0â†’R-row0â†’B-row0â†’L-row0â†’F-row0
  U' CCW: U-face CCW; R-row0â†’F-row0â†’L-row0â†’B-row0â†’R-row0
  F CW:  F-face CW; U-row2â†’R-col0â†’D-row0(rev)â†’L-col2(rev)â†’U-row2
  F' CCW: F-face CCW; R-col0â†’U-row2â†’L-col2(rev)â†’D-row0(rev)â†’R-col0
  D CW:  D-face CW; R-row2â†’F-row2â†’L-row2â†’B-row2â†’R-row2
  D' CCW: D-face CCW; F-row2â†’R-row2â†’B-row2â†’L-row2â†’F-row2
  L CW:  L-face CW; F-col0â†’U-col0â†’B-col2(rev)â†’D-col0â†’F-col0
  L' CCW: L-face CCW; U-col0â†’F-col0â†’D-col0â†’B-col2(rev)â†’U-col0
  B CW:  B-face CW; R-col2(rev)â†’U-row0â†’L-col0(rev)â†’D-row2â†’R-col2
  B' CCW: B-face CCW; U-row0â†’R-col2(rev)â†’D-row2â†’L-col0(rev)â†’U-row0
  "(rev)": strip assigned in reverse order (index 0â†”2).

  EXAMPLE â€” apply U' to state BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  Faces: U:BBB/WWW/WWW  R:GGW/RRR/RRR  F:OOO/GGW/GGW  D:YYG/YYG/YYG  L:YBB/OOO/OOO  B:RRR/YBB/YBB
  U' edge cycle: old R-row0=GGW F-row0=OOO L-row0=YBB B-row0=RRR â†’ new F-row0=GGW L-row0=OOO B-row0=YBB R-row0=RRR
  U face CCW: new[r][c]=old[2-c][r] â†’ BBB/WWW/WWW becomes WWB/WWB/WWB
  New faces: U:WWB/WWB/WWB  R:RRR/RRR/RRR  F:GGW/GGW/GGW  D:YYG/YYG/YYG  L:OOO/OOO/OOO  B:YBB/YBB/YBB
  move = U'
  next_state = WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

  IMPORTANT: Do NOT write "move =" or "next_state =" anywhere except the final two lines.

user_prompt: |
  Step: {step} | Score: {score} | Prev: {previous_move}
  Allowed: {allowed_moves}
  State: {current_state}
  Faces:
  {parsed_faces}

  Choose the move that best improves score. Apply face rotation + edge cycle rules to compute next_state.
  Output exactly two lines:
  move = <token>
  next_state = <54-char string, no spaces>
