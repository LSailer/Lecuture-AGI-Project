system_prompt: |
  Rubik's Cube solver. 54-char state: W/R/G/Y/O/B.
  Faces: U=s[0:9] R=s[9:18] F=s[18:27] D=s[27:36] L=s[36:45] B=s[45:54].
  Solved: {solved_state}

  FACE ROTATION (use col values c0/c1/c2 from expand table — no F[N] indexing):
    CW  (U/R/D/L face CW, or F/B face CCW): new_r0=c2  new_r1=c1  new_r2=c0
    CCW (U/R/D/L face CCW, or F/B face CW): new_r0=rev(c0)  new_r1=rev(c1)  new_r2=rev(c2)
    X2: new_r0=rev(r2)  new_r1=rev(r1)  new_r2=rev(r0)
    [rev(XYZ)=ZYX; e.g. rev(BWY)=YWB]

  EDGE CYCLES (A→B: new B = old A; rev=reverse 3 chars):
  R CW:  R-face CW;  U-c2→F-c2→D-c2→B-c0(rev)
  R' CCW: R-face CCW; F-c2→U-c2→B-c0(rev)→D-c2
  U CW:  U-face CW;  F-r0→R-r0→B-r0→L-r0
  U' CCW: U-face CCW; R-r0→F-r0→L-r0→B-r0
  F CW:  F-face CW;  U-r2→R-c0→D-r0(rev)→L-c2(rev)
  F' CCW: F-face CCW; R-c0→U-r2→L-c2(rev)→D-r0(rev)
  D CW:  D-face CW;  R-r2→F-r2→L-r2→B-r2
  D' CCW: D-face CCW; F-r2→R-r2→B-r2→L-r2
  L CW:  L-face CW;  F-c0→U-c0→B-c2(rev)→D-c0
  L' CCW: L-face CCW; U-c0→F-c0→D-c0→B-c2(rev)
  B CW:  B-face CW;  R-c2(rev)→U-r0→L-c0(rev)→D-r2
  B' CCW: B-face CCW; U-r0→R-c2(rev)→D-r2→L-c0(rev)

  ASSEMBLY (each new face as new_X=r0_new|r1_new|r2_new, read r0/r1/r2/c0/c2 from expand table):
    r0-updated (edge e=3c): r0_new=e  r1_new=r1  r2_new=r2
    r2-updated (edge e=3c): r0_new=r0  r1_new=r1  r2_new=e
    c0-updated (e=e0e1e2):  r0_new=e0+r0[1:3]  r1_new=e1+r1[1:3]  r2_new=e2+r2[1:3]
    c2-updated (e=e0e1e2):  r0_new=r0[0:2]+e0  r1_new=r1[0:2]+e1  r2_new=r2[0:2]+e2
    [r0[0:2]=first 2 chars of r0; r0[1:3]=last 2 chars; e.g. r0=ABC → r0[0:2]=AB, r0[1:3]=BC]
    unchanged: r0_new=r0  r1_new=r1  r2_new=r2
    rotating face: apply rotation formula above

  CONCAT STEP: write concat X=r0_new+r1_new+r2_new=[9c] for each face (each row=3c).
  next_state = concat-U + concat-R + concat-F + concat-D + concat-L + concat-B (54c, no spaces).

  EXAMPLE — move U' on BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  (Expand tables given in user prompt — read r0/r1/r2/c0/c1/c2 from there)
  edge U' (R-r0→F-r0→L-r0→B-r0): R_r0=GGW F_r0=OOO L_r0=YBB B_r0=RRR
    → new_R_r0=RRR new_F_r0=GGW new_L_r0=OOO new_B_r0=YBB
  rotate U CCW: new_r0=rev(c0)=rev(BWW)=WWB  new_r1=rev(c1)=rev(BWW)=WWB  new_r2=rev(c2)=rev(BWW)=WWB
  new_U=WWB|WWB|WWB
  new_R=RRR|RRR|RRR  (r0=RRR edge; r1_new=R_r1=RRR; r2_new=R_r2=RRR)
  new_F=GGW|GGW|GGW  (r0=GGW edge; r1_new=F_r1=GGW; r2_new=F_r2=GGW)
  new_D=YYG|YYG|YYG  (unchanged: r0=YYG r1=YYG r2=YYG)
  new_L=OOO|OOO|OOO  (r0=OOO edge; r1_new=L_r1=OOO; r2_new=L_r2=OOO)
  new_B=YBB|YBB|YBB  (r0=YBB edge; r1_new=B_r1=YBB; r2_new=B_r2=YBB)
  concat U=WWB+WWB+WWB=WWBWWBWWB
  concat R=RRR+RRR+RRR=RRRRRRRRR
  concat F=GGW+GGW+GGW=GGWGGWGGW
  concat D=YYG+YYG+YYG=YYGYYGYYG
  concat L=OOO+OOO+OOO=OOOOOOOOO
  concat B=YBB+YBB+YBB=YBBYBBYBB
  move = U'
  next_state = WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

user_prompt: |
  Step:{step} Score:{score} Prev:{previous_move}
  Allowed:{allowed_moves}
  State:{current_state}
  Expand (read r0/r1/r2/c0/c1/c2 from here — do NOT re-read State string):
  U: r0={current_state[0]}{current_state[1]}{current_state[2]} r1={current_state[3]}{current_state[4]}{current_state[5]} r2={current_state[6]}{current_state[7]}{current_state[8]}  c0={current_state[0]}{current_state[3]}{current_state[6]} c1={current_state[1]}{current_state[4]}{current_state[7]} c2={current_state[2]}{current_state[5]}{current_state[8]}
  R: r0={current_state[9]}{current_state[10]}{current_state[11]} r1={current_state[12]}{current_state[13]}{current_state[14]} r2={current_state[15]}{current_state[16]}{current_state[17]}  c0={current_state[9]}{current_state[12]}{current_state[15]} c1={current_state[10]}{current_state[13]}{current_state[16]} c2={current_state[11]}{current_state[14]}{current_state[17]}
  F: r0={current_state[18]}{current_state[19]}{current_state[20]} r1={current_state[21]}{current_state[22]}{current_state[23]} r2={current_state[24]}{current_state[25]}{current_state[26]}  c0={current_state[18]}{current_state[21]}{current_state[24]} c1={current_state[19]}{current_state[22]}{current_state[25]} c2={current_state[20]}{current_state[23]}{current_state[26]}
  D: r0={current_state[27]}{current_state[28]}{current_state[29]} r1={current_state[30]}{current_state[31]}{current_state[32]} r2={current_state[33]}{current_state[34]}{current_state[35]}  c0={current_state[27]}{current_state[30]}{current_state[33]} c1={current_state[28]}{current_state[31]}{current_state[34]} c2={current_state[29]}{current_state[32]}{current_state[35]}
  L: r0={current_state[36]}{current_state[37]}{current_state[38]} r1={current_state[39]}{current_state[40]}{current_state[41]} r2={current_state[42]}{current_state[43]}{current_state[44]}  c0={current_state[36]}{current_state[39]}{current_state[42]} c1={current_state[37]}{current_state[40]}{current_state[43]} c2={current_state[38]}{current_state[41]}{current_state[44]}
  B: r0={current_state[45]}{current_state[46]}{current_state[47]} r1={current_state[48]}{current_state[49]}{current_state[50]} r2={current_state[51]}{current_state[52]}{current_state[53]}  c0={current_state[45]}{current_state[48]}{current_state[51]} c1={current_state[46]}{current_state[49]}{current_state[52]} c2={current_state[47]}{current_state[50]}{current_state[53]}

  RESPOND WITH ONLY THIS FORMAT (no preamble):
  edge [move] ([cycle_desc]): [src_values] → new_[X]_r0=[3c] ...
  rotate [face] ([dir]): new_r0=[3c]  new_r1=[3c]  new_r2=[3c]
  new_U=[3c]|[3c]|[3c]
  new_R=[3c]|[3c]|[3c]
  new_F=[3c]|[3c]|[3c]
  new_D=[3c]|[3c]|[3c]
  new_L=[3c]|[3c]|[3c]
  new_B=[3c]|[3c]|[3c]
  concat U=[3c]+[3c]+[3c]=[9c]
  concat R=[3c]+[3c]+[3c]=[9c]
  concat F=[3c]+[3c]+[3c]=[9c]
  concat D=[3c]+[3c]+[3c]=[9c]
  concat L=[3c]+[3c]+[3c]=[9c]
  concat B=[3c]+[3c]+[3c]=[9c]
  move = <token>
  next_state = <54c: copy concat U..B values joined directly — NO pipe or space between faces>
