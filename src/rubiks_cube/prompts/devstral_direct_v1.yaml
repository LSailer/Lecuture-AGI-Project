  FACE ROTATION (new[r][c]=):
    U,D,R,L CW: old[c][2-r]   U,D,R,L CCW: old[2-c][r]
    F,B CW: old[2-c][r]        F,B CCW: old[c][2-r]
    X2: CW applied twice.

