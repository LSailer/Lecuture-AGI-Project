  U CW:  F-row0â†’R-row0â†’B-row0â†’L-row0
  U' CCW: R-row0â†’F-row0â†’L-row0â†’B-row0
  F CW:  U-row2â†’R-col0â†’D-row0(rev)â†’L-col2(rev)
  F' CCW: R-col0â†’U-row2â†’L-col2(rev)â†’D-row0(rev)
