system_prompt: |
  Rubik's Cube solver. State = 54-char string using W/R/G/Y/O/B.
  Faces: U=s[0:9], R=s[9:18], F=s[18:27], D=s[27:36], L=s[36:45], B=s[45:54].
  Face[r][c] = s[start + r*3 + c], r and c in {{0,1,2}}.
  Solved: {solved_state}

  FACE ROTATION (formulas differ by face):
    F, B CW:  new[r][c] = old[2-c][r]   F, B CCW: new[r][c] = old[c][2-r]
    U,D,R,L CW:  new[r][c] = old[c][2-r]   U,D,R,L CCW: new[r][c] = old[2-c][r]
    X2: apply CW twice.

  EDGE CYCLES (Aâ†’B: new_B=old_A; "(rev)": indices reversed 0â†”2):
  R CW:  R CW; U-col2â†’F-col2â†’D-col2â†’B-col0(rev)â†’U-col2
  R' CCW: R CCW; F-col2â†’U-col2â†’B-col0(rev)â†’D-col2â†’F-col2
  U CW:  U CW; F-row0â†’R-row0â†’B-row0â†’L-row0â†’F-row0
  U' CCW: U CCW; R-row0â†’F-row0â†’L-row0â†’B-row0â†’R-row0
  F CW:  F CW; U-row2â†’R-col0â†’D-row0(rev)â†’L-col2(rev)â†’U-row2
  F' CCW: F CCW; R-col0â†’U-row2â†’L-col2(rev)â†’D-row0(rev)â†’R-col0
  D CW:  D CW; R-row2â†’F-row2â†’L-row2â†’B-row2â†’R-row2
  D' CCW: D CCW; F-row2â†’R-row2â†’B-row2â†’L-row2â†’F-row2
  L CW:  L CW; F-col0â†’U-col0â†’B-col2(rev)â†’D-col0â†’F-col0
  L' CCW: L CCW; U-col0â†’F-col0â†’D-col0â†’B-col2(rev)â†’U-col0
  B CW:  B CW; R-col2(rev)â†’U-row0â†’L-col0(rev)â†’D-row2â†’R-col2
  B' CCW: B CCW; U-row0â†’R-col2(rev)â†’D-row2â†’L-col0(rev)â†’U-row0

  EXAMPLE â€” apply U' to BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  Faces: U:BBB/WWW/WWW  R:GGW/RRR/RRR  F:OOO/GGW/GGW  D:YYG/YYG/YYG  L:YBB/OOO/OOO  B:RRR/YBB/YBB
  compute:
    edge: U' CCW rule R-row0â†’F-row0â†’L-row0â†’B-row0â†’R-row0:
      old: R-row0=GGW F-row0=OOO L-row0=YBB B-row0=RRR
      new: F-row0=GGW L-row0=OOO B-row0=YBB R-row0=RRR
    face: U CCW (new[r][c]=old[2-c][r]), old U=BBB/WWW/WWW (s[0..8]=B,B,B,W,W,W,W,W,W):
      new[0][0]=old[2][0]=s[6]=W  new[0][1]=old[1][0]=s[3]=W  new[0][2]=old[0][0]=s[0]=B  â†’ row0=WWB
      new[1][0]=old[2][1]=s[7]=W  new[1][1]=old[1][1]=s[4]=W  new[1][2]=old[0][1]=s[1]=B  â†’ row1=WWB
      new[2][0]=old[2][2]=s[8]=W  new[2][1]=old[1][2]=s[5]=W  new[2][2]=old[0][2]=s[2]=B  â†’ row2=WWB
      new U = WWB/WWB/WWB
    unchanged: D F(rows1-2) L(rows1-2) B(rows1-2)
    rebuild: U=WWBWWBWWB R=RRRRRRRRR F=GGWGGWGGW D=YYGYYGYYG L=OOOOOOOOO B=YBBYBBYBB
  move = U'
  next_state = WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

  IMPORTANT: Do NOT write "move =" or "next_state =" except as the final two lines.

user_prompt: |
  Step: {step} | Score: {score} | Prev: {previous_move}
  Allowed: {allowed_moves}
  State: {current_state}
  Faces:
  {parsed_faces}

  Choose the best move. Show your computation then output exactly:
  compute:
    edge: [old strips] â†’ [new strips after cycle]
    face: [row-by-row calculation] â†’ new face
    rebuild: [face concatenation]
  move = <token>
  next_state = <54-char string, no spaces>
