system_prompt: |
  Rubik's Cube solver. State = 54-char string using W/R/G/Y/O/B.
  Faces: U=s[0:9], R=s[9:18], F=s[18:27], D=s[27:36], L=s[36:45], B=s[45:54].
  Face[r][c] = s[start + r*3 + c], r and c in {{0,1,2}}.
  Solved: {solved_state}

  FACE ROTATION (formulas differ by face):
    F, B CW:  new[r][c] = old[2-c][r]   F, B CCW: new[r][c] = old[c][2-r]
    U,D,R,L CW:  new[r][c] = old[c][2-r]   U,D,R,L CCW: new[r][c] = old[2-c][r]
    X2: apply CW twice.

  EDGE CYCLES (A→B: new_B=old_A; "(rev)": indices reversed 0↔2):
  R CW:  R CW; U-col2→F-col2→D-col2→B-col0(rev)→U-col2
  R' CCW: R CCW; F-col2→U-col2→B-col0(rev)→D-col2→F-col2
  U CW:  U CW; F-row0→R-row0→B-row0→L-row0→F-row0
  U' CCW: U CCW; R-row0→F-row0→L-row0→B-row0→R-row0
  F CW:  F CW; U-row2→R-col0→D-row0(rev)→L-col2(rev)→U-row2
  F' CCW: F CCW; R-col0→U-row2→L-col2(rev)→D-row0(rev)→R-col0
  D CW:  D CW; R-row2→F-row2→L-row2→B-row2→R-row2
  D' CCW: D CCW; F-row2→R-row2→B-row2→L-row2→F-row2
  L CW:  L CW; F-col0→U-col0→B-col2(rev)→D-col0→F-col0
  L' CCW: L CCW; U-col0→F-col0→D-col0→B-col2(rev)→U-col0
  B CW:  B CW; R-col2(rev)→U-row0→L-col0(rev)→D-row2→R-col2
  B' CCW: B CCW; U-row0→R-col2(rev)→D-row2→L-col0(rev)→U-row0

  EXAMPLE — apply U' to BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  Faces: U:BBB/WWW/WWW  R:GGW/RRR/RRR  F:OOO/GGW/GGW  D:YYG/YYG/YYG  L:YBB/OOO/OOO  B:RRR/YBB/YBB
  compute:
    edge: U' CCW (R-row0→F-row0→L-row0→B-row0→R-row0):
      old: R-row0=GGW, F-row0=OOO, L-row0=YBB, B-row0=RRR
      new: F-row0=GGW, L-row0=OOO, B-row0=YBB, R-row0=RRR
    face: U CCW (new[r][c]=old[2-c][r]), old U=BBB/WWW/WWW (s[0..8]=B,B,B,W,W,W,W,W,W):
      new[0][0]=old[2][0]=s[6]=W  new[0][1]=old[1][0]=s[3]=W  new[0][2]=old[0][0]=s[0]=B  → row0=WWB
      new[1][0]=old[2][1]=s[7]=W  new[1][1]=old[1][1]=s[4]=W  new[1][2]=old[0][1]=s[1]=B  → row1=WWB
      new[2][0]=old[2][2]=s[8]=W  new[2][1]=old[1][2]=s[5]=W  new[2][2]=old[0][2]=s[2]=B  → row2=WWB
      new U = WWBWWBWWB
    new faces (edge-changed row0; other rows copied unchanged from old):
      U=WWBWWBWWB  (from face rotation above)
      R=RRR|RRR|RRR → RRRRRRRRR  (R-row0=RRR from edge; rows1-2=RRR/RRR unchanged)
      F=GGW|GGW|GGW → GGWGGWGGW  (F-row0=GGW from edge; rows1-2=GGW/GGW unchanged)
      D=YYGYYGYYG  (D not in edge cycle, unchanged)
      L=OOO|OOO|OOO → OOOOOOOOO  (L-row0=OOO from edge; rows1-2=OOO/OOO unchanged)
      B=YBB|YBB|YBB → YBBYBBYBB  (B-row0=YBB from edge; rows1-2=YBB/YBB unchanged)
  move = U'
  next_state = WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

  IMPORTANT: Do NOT write "move =" or "next_state =" except as the final two lines.

user_prompt: |
  Step: {step} | Score: {score} | Prev: {previous_move}
  Allowed: {allowed_moves}
  State: {current_state}
  Faces:
  {parsed_faces}

  Choose the best move. Show computation then output:
  compute:
    edge: [old strips] → [new row0/col for each affected face]
    face: [row-by-row for rotating face] → new face = <9chars>
    new faces: U=<9> R=<9> F=<9> D=<9> L=<9> B=<9>
  move = <token>
  next_state = <U+R+F+D+L+B concatenated, NO spaces, exactly 54 chars>
