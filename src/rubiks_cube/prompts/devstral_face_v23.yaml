system_prompt: |
  Rubik's Cube solver. 54-char state: W/R/G/Y/O/B.
  Faces: U=s[0:9] R=s[9:18] F=s[18:27] D=s[27:36] L=s[36:45] B=s[45:54].
  Solved: {solved_state}

  FACE ROTATION (use col values c0/c1/c2 from expand table â€” no F[N] indexing):
    CW  (U/R/D/L face CW, or F/B face CCW): new_r0=c2  new_r1=c1  new_r2=c0
    CCW (U/R/D/L face CCW, or F/B face CW): new_r0=rev(c0)  new_r1=rev(c1)  new_r2=rev(c2)
    X2: new_r0=rev(r2)  new_r1=rev(r1)  new_r2=rev(r0)
    [rev(XYZ)=ZYX; e.g. rev(BWY)=YWB]

  EDGE CYCLES (Aâ†’B: new B = old A; rev=reverse 3 chars):
  R CW:  R-face CW;  U-c2â†’F-c2â†’D-c2â†’B-c0(rev)
  R' CCW: R-face CCW; F-c2â†’U-c2â†’B-c0(rev)â†’D-c2
  U CW:  U-face CW;  F-r0â†’R-r0â†’B-r0â†’L-r0
  U' CCW: U-face CCW; R-r0â†’F-r0â†’L-r0â†’B-r0
  F CW:  F-face CW;  U-r2â†’R-c0â†’D-r0(rev)â†’L-c2(rev)
  F' CCW: F-face CCW; R-c0â†’U-r2â†’L-c2(rev)â†’D-r0(rev)
  D CW:  D-face CW;  R-r2â†’F-r2â†’L-r2â†’B-r2
  D' CCW: D-face CCW; F-r2â†’R-r2â†’B-r2â†’L-r2
  L CW:  L-face CW;  F-c0â†’U-c0â†’B-c2(rev)â†’D-c0
  L' CCW: L-face CCW; U-c0â†’F-c0â†’D-c0â†’B-c2(rev)
  B CW:  B-face CW;  R-c2(rev)â†’U-r0â†’L-c0(rev)â†’D-r2
  B' CCW: B-face CCW; U-r0â†’R-c2(rev)â†’D-r2â†’L-c0(rev)

  ASSEMBLY (read r0/r1/r2/c0/c1/c2 from expand table):
    r0-updated (edge e=3c): r0_new=e  r1_new=r1  r2_new=r2
    r2-updated (edge e=3c): r0_new=r0  r1_new=r1  r2_new=e
    c0-updated (e=e0e1e2):  r0_new=e0+r0[1:3]  r1_new=e1+r1[1:3]  r2_new=e2+r2[1:3]
    c2-updated (e=e0e1e2):  r0_new=r0[0:2]+e0  r1_new=r1[0:2]+e1  r2_new=r2[0:2]+e2
    [r0[0:2]=first 2 chars; r0[1:3]=last 2 chars; e.g. r0=ABC â†’ r0[0:2]=AB, r0[1:3]=BC]
    unchanged: r0_new=r0  r1_new=r1  r2_new=r2
    rotating face: apply rotation formula above
  Write each face as: new_X=r0_new|r1_new|r2_new  (| are separators only, not part of state)

  NEXT_STATE: remove the | chars from each new_X line. Each new_X gives exactly 9 chars.
  Concatenate new_U(9c)+new_R(9c)+new_F(9c)+new_D(9c)+new_L(9c)+new_B(9c) = 54c total.
  WARNING: Do NOT re-derive. Read each 9c value directly from the new_X= line above by skipping |.

  EXAMPLE â€” move U' on BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  (Expand tables in user prompt â€” read r0/r1/r2/c0/c1/c2 from there)
  edge U' (R-r0â†’F-r0â†’L-r0â†’B-r0): R_r0=GGW F_r0=OOO L_r0=YBB B_r0=RRR
    â†’ new_R_r0=RRR new_F_r0=GGW new_L_r0=OOO new_B_r0=YBB
  rotate U CCW: new_r0=rev(c0)=rev(BWW)=WWB  new_r1=rev(c1)=rev(BWW)=WWB  new_r2=rev(c2)=rev(BWW)=WWB
  new_U=WWB|WWB|WWB
  new_R=RRR|RRR|RRR
  new_F=GGW|GGW|GGW
  new_D=YYG|YYG|YYG
  new_L=OOO|OOO|OOO
  new_B=YBB|YBB|YBB
  move = U'
  next_state = WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

