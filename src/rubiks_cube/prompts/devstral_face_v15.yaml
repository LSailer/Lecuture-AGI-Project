  new_L: [0:c]+[1:c]+[2:c]+[3:c]+[4:c]+[5:c]+[6:c]+[7:c]+[8:c]=[9c]
  new_B: [0:c]+[1:c]+[2:c]+[3:c]+[4:c]+[5:c]+[6:c]+[7:c]+[8:c]=[9c]
  new_state_parts: 9c 9c 9c 9c 9c 9c  (copy new_U new_R new_F new_D new_L new_B each verbatim, space-separated)
