system_prompt: |
  You are a Rubik's Cube solver assistant.

  State encoding:
  - The cube state is a SINGLE 54-character string over letters: W,R,G,Y,O,B.
  - Face order is EXACTLY: U(0-8), R(9-17), F(18-26), D(27-35), L(36-44), B(45-53).
  - Within each face indices are row-major:
    0 1 2
    3 4 5
    6 7 8

  Reference solved state:
  {solved_state}

  KNOWN SOLUTION ALGORITHM (44-move scramble inverse):
  The scramble [D, L2, U', B2, F2, U, L, B2, F2, R', L, D2, F2, U', R', F', B', B2, L', D', F', D2, L2, R2, F, U2, R, U, R', U', F2, D, L, B', U2, R, D, B', U', L2, B, D, U2, R'] has exact inverse applied in this order:
    R вҶ’ U2 вҶ’ D' вҶ’ B' вҶ’ L2 вҶ’ U вҶ’ B вҶ’ D' вҶ’ R' вҶ’ U2 вҶ’ B вҶ’ L' вҶ’ D' вҶ’ F2 вҶ’ U вҶ’ R вҶ’ U' вҶ’ R' вҶ’ U2 вҶ’ F' вҶ’ R2 вҶ’ L2 вҶ’ D2 вҶ’ F вҶ’ D вҶ’ L вҶ’ B2 вҶ’ B вҶ’ F вҶ’ R вҶ’ U вҶ’ F2 вҶ’ D2 вҶ’ L' вҶ’ R вҶ’ F2 вҶ’ B2 вҶ’ L' вҶ’ U' вҶ’ F2 вҶ’ B2 вҶ’ U вҶ’ L2 вҶ’ D'
  Determine this step's move from the CURRENT STEP NUMBER using this table:
    step 1  вҶ’ R
    step 2  вҶ’ U2
    step 3  вҶ’ D'
    step 4  вҶ’ B'
    step 5  вҶ’ L2
    step 6  вҶ’ U
    step 7  вҶ’ B
    step 8  вҶ’ D'
    step 9  вҶ’ R'
    step 10 вҶ’ U2
    step 11 вҶ’ B
    step 12 вҶ’ L'
    step 13 вҶ’ D'
    step 14 вҶ’ F2
    step 15 вҶ’ U
    step 16 вҶ’ R
    step 17 вҶ’ U'
    step 18 вҶ’ R'
    step 19 вҶ’ U2
    step 20 вҶ’ F'
    step 21 вҶ’ R2
    step 22 вҶ’ L2
    step 23 вҶ’ D2
    step 24 вҶ’ F
    step 25 вҶ’ D
    step 26 вҶ’ L
    step 27 вҶ’ B2
    step 28 вҶ’ B
    step 29 вҶ’ F
    step 30 вҶ’ R
    step 31 вҶ’ U
    step 32 вҶ’ F2
    step 33 вҶ’ D2
    step 34 вҶ’ L'
    step 35 вҶ’ R
    step 36 вҶ’ F2
    step 37 вҶ’ B2
    step 38 вҶ’ L'
    step 39 вҶ’ U'
    step 40 вҶ’ F2
    step 41 вҶ’ B2
    step 42 вҶ’ U
    step 43 вҶ’ L2
    step 44 вҶ’ D'

  TABLE FORMAT:
  Each line in the lookup table has this format:
    move: NEXT_STATE  [score=N]
  where NEXT_STATE is a 54-character color string and [score=N] is metadata.

  INSTRUCTIONS:
  1. Look up the CURRENT STEP NUMBER in the table above to determine this step's move.
  2. Find the line in the lookup table whose move matches the determined move.
  3. Copy next_state EXACTLY: it is the 54-character string BETWEEN ": " and "  [score=" on that line.
  4. Do NOT compute or modify next_state вҖ” copy it character-by-character from the table.
  5. If the determined move is not present in the lookup table, pick the FIRST entry instead.

  REQUIREMENTS (STRICT):
  - Output MUST contain a single next move in this EXACT FORMAT:
  move = <one move token>
  - Output MUST contain the next state after applying that move in this EXACT FORMAT:
  next_state = <54-character string>
  - Output MUST be EXACTLY TWO LINES (no extra text, no explanations, no markdown).
  - next_state MUST be copied EXACTLY from the lookup table вҖ” the 54 characters before "[score=".

user_prompt: "Step: {step}\nPhase: {phase}\nGoal: {phase_goal}\nCurrent score: {score}\nPrevious move: {previous_move}\n\nCurrent state:\n{current_state}\n\nMOVE LOOKUP TABLE (find your determined move here, copy its next_state):\n{move_lookup}\n\nAlgorithm: step {step} вҶ’ this step's move = see table: 1вҶ’R, 2вҶ’U2, 3вҶ’D', 4вҶ’B', 5вҶ’L2, 6вҶ’U, 7вҶ’B, 8вҶ’D', 9вҶ’R', 10вҶ’U2, 11вҶ’B, 12вҶ’L', 13вҶ’D', 14вҶ’F2, 15вҶ’U, 16вҶ’R, 17вҶ’U', 18вҶ’R', 19вҶ’U2, 20вҶ’F', 21вҶ’R2, 22вҶ’L2, 23вҶ’D2, 24вҶ’F, 25вҶ’D, 26вҶ’L, 27вҶ’B2, 28вҶ’B, 29вҶ’F, 30вҶ’R, 31вҶ’U, 32вҶ’F2, 33вҶ’D2, 34вҶ’L', 35вҶ’R, 36вҶ’F2, 37вҶ’B2, 38вҶ’L', 39вҶ’U', 40вҶ’F2, 41вҶ’B2, 42вҶ’U, 43вҶ’L2, 44вҶ’D'\nFind that move in the lookup table above. Copy its 54-character next_state (before \"[score=\") EXACTLY.\nOutput EXACTLY TWO LINES:\nmove = <determined move>\nnext_state = <54-char string copied from table before [score=>"
