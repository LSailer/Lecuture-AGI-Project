system_prompt: |
  Rubik's Cube solver. State = 54-char string using W/R/G/Y/O/B.
  Faces: U=s[0:9], R=s[9:18], F=s[18:27], D=s[27:36], L=s[36:45], B=s[45:54].
  Face[r][c] = s[start + r*3 + c], r,c in {{0,1,2}}.
  Col-c of face (start s0): positions s0+c, s0+3+c, s0+6+c.
  Solved: {solved_state}

  FACE ROTATION:
    F,B CW: new[r][c]=old[2-c][r]    F,B CCW: new[r][c]=old[c][2-r]
    U,D,R,L CW: new[r][c]=old[c][2-r]  U,D,R,L CCW: new[r][c]=old[2-c][r]
    X2: apply CW twice.

  EDGE CYCLES (Aâ†’B: new_B=old_A; (rev)=strip reversed 0â†”2):
  R CW:  R CW; U-col2â†’F-col2â†’D-col2â†’B-col0(rev)â†’U-col2
  R' CCW: R CCW; F-col2â†’U-col2â†’B-col0(rev)â†’D-col2â†’F-col2
  U CW:  U CW; F-row0â†’R-row0â†’B-row0â†’L-row0â†’F-row0
  U' CCW: U CCW; R-row0â†’F-row0â†’L-row0â†’B-row0â†’R-row0
  F CW:  F CW; U-row2â†’R-col0â†’D-row0(rev)â†’L-col2(rev)â†’U-row2
  F' CCW: F CCW; R-col0â†’U-row2â†’L-col2(rev)â†’D-row0(rev)â†’R-col0
  D CW:  D CW; R-row2â†’F-row2â†’L-row2â†’B-row2â†’R-row2
  D' CCW: D CCW; F-row2â†’R-row2â†’B-row2â†’L-row2â†’F-row2
  L CW:  L CW; F-col0â†’U-col0â†’B-col2(rev)â†’D-col0â†’F-col0
  L' CCW: L CCW; U-col0â†’F-col0â†’D-col0â†’B-col2(rev)â†’U-col0
  B CW:  B CW; R-col2(rev)â†’U-row0â†’L-col0(rev)â†’D-row2â†’R-col2
  B' CCW: B CCW; U-row0â†’R-col2(rev)â†’D-row2â†’L-col0(rev)â†’U-row0

  EXAMPLE â€” apply U' to BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  Faces: U:BBB/WWW/WWW R:GGW/RRR/RRR F:OOO/GGW/GGW D:YYG/YYG/YYG L:YBB/OOO/OOO B:RRR/YBB/YBB
  compute:
    edge U' CCW (R-row0â†’F-row0â†’L-row0â†’B-row0â†’R-row0):
      old: R0=GGW F0=OOO L0=YBB B0=RRR
      new: F0â†گGGW L0â†گOOO B0â†گYBB R0â†گRRR
    face U CCW (new[r][c]=old[2-c][r], oldU=BBB/WWW/WWW):
      row0=[old[2][0],old[1][0],old[0][0]]=[W,W,B]â†’WWB
      row1=[old[2][1],old[1][1],old[0][1]]=[W,W,B]â†’WWB
      row2=[old[2][2],old[1][2],old[0][2]]=[W,W,B]â†’WWB
    new faces (format: [r0][r1][r2]=9chars; for unchanged rows copy EXACTLY from old face rows):
      U: [WWB][WWB][WWB]=WWBWWBWWB  (all face-rotated)
      R: [RRR][RRR][RRR]=RRRRRRRRR  r0=edge(RRR), r1=old-R-r1(RRR), r2=old-R-r2(RRR)
      F: [GGW][GGW][GGW]=GGWGGWGGW  r0=edge(GGW), r1=old-F-r1(GGW), r2=old-F-r2(GGW)
      D: [YYG][YYG][YYG]=YYGYYGYYG  (unchanged: r0=old-D-r0, r1=old-D-r1, r2=old-D-r2)
      L: [OOO][OOO][OOO]=OOOOOOOOO  r0=edge(OOO), r1=old-L-r1(OOO), r2=old-L-r2(OOO)
      B: [YBB][YBB][YBB]=YBBYBBYBB  r0=edge(YBB), r1=old-B-r1(YBB), r2=old-B-r2(YBB)
  move = U'
  next_state = WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

  IMPORTANT: Do NOT write "move =" or "next_state =" except as the final two lines.

user_prompt: |
  Step: {step} | Score: {score} | Prev: {previous_move}
  Allowed: {allowed_moves}
  State: {current_state}
  Faces (row0/row1/row2):
  {parsed_faces}

  Choose the best move. Show computation then output:
  compute:
    edge: [cycle for chosen move] old [strips] â†’ new [strips]
    face: [rotating face] [formula] old=[rows] â†’ row0=... row1=... row2=...
    new faces ([r0][r1][r2]=9chars; for unchanged rows copy EXACTLY from Faces above):
      U: [<r0>][<r1>][<r2>]=<9chars>
      R: [<r0>][<r1>][<r2>]=<9chars>
      F: [<r0>][<r1>][<r2>]=<9chars>
      D: [<r0>][<r1>][<r2>]=<9chars>
      L: [<r0>][<r1>][<r2>]=<9chars>
      B: [<r0>][<r1>][<r2>]=<9chars>
  move = <token>
  next_state = <U9chars><R9chars><F9chars><D9chars><L9chars><B9chars>
