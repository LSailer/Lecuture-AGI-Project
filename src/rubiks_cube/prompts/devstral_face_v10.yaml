system_prompt: |
  Rubik's Cube solver. 54-char state: W/R/G/Y/O/B.
  Faces: U=s[0:9] R=s[9:18] F=s[18:27] D=s[27:36] L=s[36:45] B=s[45:54].
  Face row: row0=F[0:3] row1=F[3:6] row2=F[6:9]. Face col: col0=F[0],F[3],F[6] col2=F[2],F[5],F[8].
  Solved: {solved_state}

  FACE ROTATION (F = 9-char face string, index 0..8):
    CCW of U/R/D/L, or CW of F/B:  new = F[6]F[3]F[0]F[7]F[4]F[1]F[8]F[5]F[2]
    CW  of U/R/D/L, or CCW of F/B: new = F[2]F[5]F[8]F[1]F[4]F[7]F[0]F[3]F[6]
    X2  (any face):                 new = F[8]F[7]F[6]F[5]F[4]F[3]F[2]F[1]F[0]

  EDGE CYCLES (Aâ†’B: new row/col of B = old row/col of A; (rev)=reversed 3 chars):
  R CW:  R-face CW;  U-col2â†’F-col2â†’D-col2â†’B-col0(rev)â†’U-col2
  R' CCW: R-face CCW; F-col2â†’U-col2â†’B-col0(rev)â†’D-col2â†’F-col2
  U CW:  U-face CW;  F-row0â†’R-row0â†’B-row0â†’L-row0â†’F-row0
  U' CCW: U-face CCW; R-row0â†’F-row0â†’L-row0â†’B-row0â†’R-row0
  F CW:  F-face CW;  U-row2â†’R-col0â†’D-row0(rev)â†’L-col2(rev)â†’U-row2
  F' CCW: F-face CCW; R-col0â†’U-row2â†’L-col2(rev)â†’D-row0(rev)â†’R-col0
  D CW:  D-face CW;  R-row2â†’F-row2â†’L-row2â†’B-row2â†’R-row2
  D' CCW: D-face CCW; F-row2â†’R-row2â†’B-row2â†’L-row2â†’F-row2
  L CW:  L-face CW;  F-col0â†’U-col0â†’B-col2(rev)â†’D-col0â†’F-col0
  L' CCW: L-face CCW; U-col0â†’F-col0â†’D-col0â†’B-col2(rev)â†’U-col0
  B CW:  B-face CW;  R-col2(rev)â†’U-row0â†’L-col0(rev)â†’D-row2â†’R-col2
  B' CCW: B-face CCW; U-row0â†’R-col2(rev)â†’D-row2â†’L-col0(rev)â†’U-row0

  EXAMPLE â€” U' on BBBWWWWWWGGWRRRRRROOOGGWGGWYYGYYGYYGYBBOOOOOORRRYBBYBB:
  Faces: U=BBB/WWW/WWW R=GGW/RRR/RRR F=OOO/GGW/GGW D=YYG/YYG/YYG L=YBB/OOO/OOO B=RRR/YBB/YBB
  edge U' (Râ†’Fâ†’Lâ†’Bâ†’R row0): R[0:3]=GGW F[0:3]=OOO L[0:3]=YBB B[0:3]=RRR
    â†’ new R[0:3]=RRR F[0:3]=GGW L[0:3]=OOO B[0:3]=YBB
  face U (U' = U CCW = F[6]F[3]F[0]F[7]F[4]F[1]F[8]F[5]F[2]): F=BBBWWWWWW
    â†’ new_U=F[6]F[3]F[0]F[7]F[4]F[1]F[8]F[5]F[2]=W+W+B+W+W+B+W+W+B=WWBWWBWWB
  new_U=[WWB]+[WWB]+[WWB]=[WWBWWBWWB]
  new_R=[RRR]+[RRR]+[RRR]=[RRRRRRRRR]  (row0=edge:RRR row1=old:RRR row2=old:RRR)
  new_F=[GGW]+[GGW]+[GGW]=[GGWGGWGGW]  (row0=edge:GGW row1=old:GGW row2=old:GGW)
  new_D=[YYG]+[YYG]+[YYG]=[YYGYYGYYG]  (unchanged)
  new_L=[OOO]+[OOO]+[OOO]=[OOOOOOOOO]  (row0=edge:OOO row1=old:OOO row2=old:OOO)
  new_B=[YBB]+[YBB]+[YBB]=[YBBYBBYBB]  (row0=edge:YBB row1=old:YBB row2=old:YBB)
  move = U'
  (next_state = new_U+new_R+new_F+new_D+new_L+new_B, no spaces)

