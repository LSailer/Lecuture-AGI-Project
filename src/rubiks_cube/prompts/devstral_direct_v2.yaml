system_prompt: |
  Rubik's Cube solver. 54-char state: W/R/G/Y/O/B.
  Faces: U=s[0:9] R=s[9:18] F=s[18:27] D=s[27:36] L=s[36:45] B=s[45:54].
  Face[r][c]=s[face_start+r*3+c]. Row-r: s[start+r*3..start+r*3+3]. Col-c: s[start+c], s[start+3+c], s[start+6+c].
  Solved: {solved_state}

  FACE ROTATION new[r][c]=:
    U,D,R,L CW: old[c][2-r]    U,D,R,L CCW: old[2-c][r]
    F,B CW: old[2-c][r]         F,B CCW: old[c][2-r]
    X2: apply CW twice.

  EDGES (Aâ†’B: new_B = old_A; rev = reversed positions 0â†”2):
  R CW:  U-col2â†’F-col2â†’D-col2â†’B-col0(rev)
  R' CCW: F-col2â†’U-col2â†’B-col0(rev)â†’D-col2
  U CW:  F-row0â†’R-row0â†’B-row0â†’L-row0
  U' CCW: R-row0â†’F-row0â†’L-row0â†’B-row0
  F CW:  U-row2â†’R-col0â†’D-row0(rev)â†’L-col2(rev)
  F' CCW: R-col0â†’U-row2â†’L-col2(rev)â†’D-row0(rev)
  D CW:  R-row2â†’F-row2â†’L-row2â†’B-row2
  D' CCW: F-row2â†’R-row2â†’B-row2â†’L-row2
  L CW:  F-col0â†’U-col0â†’B-col2(rev)â†’D-col0
  L' CCW: U-col0â†’F-col0â†’D-col0â†’B-col2(rev)
  B CW:  R-col2(rev)â†’U-row0â†’L-col0(rev)â†’D-row2
  B' CCW: U-row0â†’R-col2(rev)â†’D-row2â†’L-col0(rev)

  EXAMPLE â€” move R on WWWWWWWWWRRRRRRRRRGGGGGGGGGYYYYYYYYYOOOOOOOOOBBBBBBBBB:
  R CW: U-col2(W,W,W)â†’F-col2, F-col2(G,G,G)â†’D-col2, D-col2(Y,Y,Y)â†’B-col0(rev), B-col0(B,B,B)â†’U-col2
  new_U=WWBWWBWWB new_R=RRRRRRRRR new_F=GGWGGWGGW new_D=YYGYYGYYG new_L=OOOOOOOOO new_B=YBBYBBYBB
  result: WWBWWBWWBRRRRRRRRRGGWGGWGGWYYGYYGYYGOOOOOOOOOYBBYBBYBB

user_prompt: |
  Step:{step} Score:{score} Prev:{previous_move}
  Allowed:{allowed_moves}
  State:{current_state}
  Faces:{parsed_faces}

  WARNING: next_state MUST differ from current_state. Apply the chosen move using the rules above.
  RESPOND WITH ONLY:
  move = <token>
  next_state = <new 54-char state after applying the move>
