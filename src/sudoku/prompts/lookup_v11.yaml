  Output EXACTLY two lines, nothing else:
  move = [R, C, V]
  next_state = [[...], [...], [...], [...], [...], [...], [...], [...], [...]]

user_prompt: |
  Execute step: {step}
  Current_state:
  {current_state}

  From the table: find "Step {step}:" and read row=R col=C val=V.
  Copy current_state. Set grid[R][C] = V. Only that one cell changes.

  move = [R, C, V]
  next_state = [...]
