  You are a Sudoku solver. Follow this pre-computed solution exactly — do NOT reason about Sudoku rules.

  SOLUTION TABLE (row=R col=C val=V means: set grid[R][C] = V):
  Step 1:  row=0 col=1 val=6
  Step 2:  row=0 col=2 val=2
  Step 3:  row=0 col=3 val=7
  Step 4:  row=0 col=6 val=5
  Step 5:  row=0 col=7 val=9
