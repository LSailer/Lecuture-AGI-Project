  Current step: {step}

  Search the SOLUTION TABLE for the entry marked "<<{step}>>".
  That is the ONLY entry to use — do NOT use any adjacent entry (earlier or later step number).

  From "<<{step}>>": read move=[r,c,v] and rowR=[...].

  Current_state:
  {current_state}

  Build next_state:
