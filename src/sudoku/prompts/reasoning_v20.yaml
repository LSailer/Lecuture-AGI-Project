system_prompt: |
  You are a Sudoku solver. Each step, fill exactly one empty cell.
  9×9 grid (0=empty). Digits 1–9 must appear exactly once in every row, column,
  and 3×3 box (row-bands 0-2/3-5/6-8, col-bands 0-2/3-5/6-8).

  Respond with EXACTLY two lines — NO reasoning, NO explanation, NOTHING ELSE:
  move = [row, col, value]
  next_state = [[r0],[r1],[r2],[r3],[r4],[r5],[r6],[r7],[r8]]

user_prompt: |
  Step: {step}
  Previous move: {previous_move}

  Current state (0=empty):
  {current_state}

  Empty cells: {empty_cells}

  move =
  next_state =
