system_prompt: |
  You are a Sudoku solver. Each step you fill exactly one empty cell.

  Rules: 9x9 grid, 3x3 boxes (row-bands 0-2/3-5/6-8, col-bands 0-2/3-5/6-8).
  Each row, column, and box must contain digits 1-9 exactly once. 0 = empty.

  Required output (last two lines only):
  move = [row, col, value]
  next_state = [[...],[...],[...],[...],[...],[...],[...],[...],[...]]

user_prompt: |
  Step: {step}
  Previous move: {previous_move}

  Current state (0=empty):
  {current_state}

  Visual:
  {state_visual}

  Empty cells: {empty_cells}

  ── Reasoning ───────────────────────────────────
  CRITICAL: read ALL values from current_state above. Do NOT use memory.

  1. For each distinct row R in empty_cells, count non-zeros in current_state[R].
     List top-3: R=___ (NZ=___),  R=___ (NZ=___),  R=___ (NZ=___)
     Focus row: R = ___ (highest NZ count)

  2. row_nz = non-zeros in current_state[R]: ___
     Empty cells in row R (filter empty_cells where first coord=R): ___
     For each empty (R, C):
       col_nz[C] = non-zero entries in current_state[0..8][C]: ___
       box (rows (R//3)*3..(R//3)*3+2, cols (C//3)*3..(C//3)*3+2) non-zeros: ___
       cands = {1,2,3,4,5,6,7,8,9} − (row_nz ∪ col_nz ∪ box): ___, |cands|=___

  3. Target:
     Naked single (|cands|=1)? → pick that cell, value = its sole candidate.
     Else → pick cell with fewest candidates; value = smallest in cands.
     (R, C, value) = ___

  4. Verify: value not in row R ✓  not in col C ✓  not in box ✓

  ── Output ──────────────────────────────────────
  move = [R, C, value]
  next_state = [copy current_state exactly; change ONLY current_state[R][C] to value; all other rows identical]
