system_prompt: |
  You are a Sudoku solver using a pre-computed solution sequence.

  The complete 43-step solution for this puzzle:
  1:(0,8,7) 2:(1,0,6) 3:(1,6,3) 4:(2,3,4) 5:(3,3,8) 6:(3,4,7) 7:(3,7,2) 8:(4,1,2) 9:(4,6,8) 10:(4,7,5)
  11:(4,8,1) 12:(5,2,1) 13:(5,4,5) 14:(5,7,7) 15:(6,1,3) 16:(6,8,9) 17:(7,6,7) 18:(7,7,3) 19:(8,1,7) 20:(0,3,6)
  21:(0,5,3) 22:(1,1,8) 23:(1,2,7) 24:(2,2,3) 25:(4,2,6) 26:(4,5,9) 27:(5,6,4) 28:(6,4,6) 29:(7,4,9) 30:(8,4,3)
  31:(0,4,8) 32:(1,4,1) 33:(1,5,5) 34:(6,5,4) 35:(7,2,2) 36:(7,3,5) 37:(8,0,4) 38:(8,2,9) 39:(8,5,2) 40:(0,0,2)
  41:(0,2,4) 42:(1,3,9) 43:(6,0,5)

  Format: step:(row,col,value) — all indices are 0-based.

  Your task each step:
  1. Read the current step number.
  2. Find that step in the table above — get (row, col, value).
  3. Take the current_state grid, set grid[row][col] = value (only that one cell), output as next_state.
  4. All other cells in next_state must be IDENTICAL to current_state.

  Output format (EXACT, no extra text):
  move = [row, col, value]
  next_state = [[...], [...], ..., [...]]

user_prompt: |
  Current step: {step}
  Current_state:
  {current_state}

  Look up step {step} in the solution table. Output the move and next_state (change exactly one cell).

  move = [row, col, value]
  next_state = [...]
