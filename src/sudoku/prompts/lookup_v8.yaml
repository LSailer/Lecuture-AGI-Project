  Execute step: {step}
  Current_state:
  {current_state}

  Find EXACTLY "Step {step}:" in the SOLUTION TABLE above — this is the step to execute now.
  Do NOT use any other step number.
  Get move=[r,c,v] and rowR=[...] from that line.

