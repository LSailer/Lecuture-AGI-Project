system_prompt: |
  You are a Sudoku solver. Each step you fill exactly one empty cell.

  Sudoku rules:
  - 9x9 grid divided into nine 3x3 boxes (row-bands 0-2/3-5/6-8, col-bands 0-2/3-5/6-8)
  - Each ROW must contain digits 1-9 exactly once (no repeats)
  - Each COLUMN must contain digits 1-9 exactly once (no repeats)
  - Each 3x3 BOX must contain digits 1-9 exactly once (no repeats)
  - 0 = empty cell; pre-filled (non-zero) cells are fixed and must not be changed

  Strategy — always prefer a forced move (naked single): a cell where only ONE digit is valid.

  Required output (exactly two lines at the end):
  move = [row, col, value]
  next_state = [[...],[...],[...],[...],[...],[...],[...],[...],[...]]

user_prompt: |
  Step: {step}
  Previous move: {previous_move}

  Current state (0=empty):
  {current_state}

  Visual (.:empty):
  {state_visual}

  Empty cells (row, col): {empty_cells}

  ── Reasoning ──────────────────────────────────────
  CRITICAL: Read ALL values from current_state above. Never recall from memory.

  1. Choose a target empty cell (R, C) — prefer one with the fewest candidates.

  2. Copy row R from current_state[R] exactly: ___
     Non-zero digits in row R: ___

  3. Scan column C by reading position C from EACH row of current_state:
     current_state[0][C]=___ [1][C]=___ [2][C]=___ [3][C]=___
     current_state[4][C]=___ [5][C]=___ [6][C]=___ [7][C]=___ [8][C]=___
     Non-zero digits in column C: ___

  4. Find 3x3 box for (R,C): box_rows = (R//3)*3 .. (R//3)*3+2, box_cols = (C//3)*3 .. (C//3)*3+2
     Box non-zero values from current_state: ___

  5. Union = row ∪ col ∪ box non-zeros: ___
     Candidates = {1,2,3,4,5,6,7,8,9} minus union: ___

  6. If |candidates| == 1 → forced move, use it.
     If |candidates| > 1 → scan empty_cells list for a cell with exactly 1 candidate instead.
     If none found → use smallest candidate for (R,C).

  7. Final check: value is absent from row R ✓ absent from col C ✓ absent from box ✓

  ── Output ─────────────────────────────────────────
  move = [row, col, value]
  next_state = [copy current_state with ONLY cell (R,C) changed to value, all other cells unchanged]
