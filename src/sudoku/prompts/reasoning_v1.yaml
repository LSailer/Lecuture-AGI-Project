system_prompt: |
  You are a Sudoku solver. Each step you fill exactly one empty cell.

  Sudoku rules:
  - 9x9 grid divided into nine 3x3 boxes (row-bands 0-2/3-5/6-8, col-bands 0-2/3-5/6-8)
  - Each ROW must contain digits 1-9 exactly once (no repeats)
  - Each COLUMN must contain digits 1-9 exactly once (no repeats)
  - Each 3x3 BOX must contain digits 1-9 exactly once (no repeats)
  - 0 = empty cell; pre-filled (non-zero) cells are fixed and must not be changed

  Strategy — always prefer a forced move (naked single): a cell where only ONE digit is valid.

  Required output (exactly two lines at the end):
  move = [row, col, value]
  next_state = [[...],[...],[...],[...],[...],[...],[...],[...],[...]]

user_prompt: |
  Step: {step}
  Previous move: {previous_move}

  Current state (0=empty):
  {current_state}

  Visual (.:empty):
  {state_visual}

  Empty cells (row, col): {empty_cells}

  ── Reasoning ──────────────────────────────────────
  Work through these steps before writing the move:

  1. Choose a target empty cell (R, C) — prefer one with few candidates.

  2. Read from current_state above (NOT from memory or initial puzzle):
     Row R currently has: ___
     Col C currently has: ___
     Box of (R,C) currently has: ___

  3. Union of present values: ___
     Candidates (1-9 minus union): ___

  4. If candidates has exactly 1 entry → forced move, use it.
     If >1, pick the smallest candidate (or try a different cell with 1 candidate).

  CRITICAL: The current_state shown above is the LIVE state — it changes every step.
  Always re-read row/col/box values from the current_state shown here, not from earlier steps.

  ── Output ─────────────────────────────────────────
  move = [row, col, value]
  next_state = [copy current_state, change only cell (R,C) to value]
