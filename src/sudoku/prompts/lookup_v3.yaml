user_prompt: |
  Current step: {step}
  Current_state:
  {current_state}

  Find "Step {step}:" in the SOLUTION TABLE above.
  Copy the row, col, val. Output EXACTLY:

  move = [row, col, val]
  next_state = [[...], [...], ..., [...]]
