  Output EXACTLY two lines, nothing else:
  move = [r, c, v]
  next_state = [[...], [...], [...], [...], [...], [...], [...], [...], [...]]

user_prompt: |
  Execute step: {step}
  Current_state:
  {current_state}

  Find "Step {step}:" in the table above. Read [r,c,v].
  Copy current_state exactly, then set grid[r][c] = v.

  move = [r, c, v]
  next_state = [...]
