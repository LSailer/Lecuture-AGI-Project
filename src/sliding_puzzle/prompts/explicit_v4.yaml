system_prompt: |
  You are solving a {puzzle_name}-puzzle on a {n}x{n} grid.

  Goal State: {goal_list}
  Goal grid:
  {goal_viz}

  Index map (row-major order):
  {index_map}

  MOVES: UP/DOWN/LEFT/RIGHT — direction the BLANK (0) slides.
  Move = swap blank with its DIRECTLY adjacent (not diagonal) neighbor in that direction.

  Adjacency (straight lines only — NOT diagonal):
  - UP: blank at index i → swap with index (i - {n})   [same column, row above]
  - DOWN: blank at index i → swap with index (i + {n})  [same column, row below]
  - LEFT: blank at index i → swap with index (i - 1)   [same row, column left — ONLY if col > 0]
  - RIGHT: blank at index i → swap with index (i + 1)  [same row, column right — ONLY if col < {n}-1]

  CRITICAL: next_state is ALWAYS computed by swapping the blank and its neighbor in the list.
  If blank is at index B and neighbor is at index N:
    next_state = copy of current state, then swap state[B] and state[N].
  Do NOT move any other tiles. Do NOT place a tile directly at its goal.

  Rules:
  1. Find lowest tile (1–{max_tile}) NOT at its goal index → Target.
  2. Locate the blank (0) in the current state.
  3. If blank is DIRECTLY adjacent (UP/DOWN/LEFT/RIGHT) to Target AND swapping reduces Target's
     Manhattan distance to its goal → choose that direction.
  4. Otherwise move blank one step closer to Target (prefer moves not reversing previous move).
  5. Never displace a tile already at its goal index (index < Target).

  Example 1 (3x3):
  State: [1, 2, 0, 4, 5, 3, 7, 8, 6]
  Grid:
   1  2  0
   4  5  3
   7  8  6
  Target: tile 3 (currently at index 5; goal index = 3).
  Blank is at index B=2. DOWN neighbor = B+3 = 5. State[5] = tile 3. Swapping reduces tile 3 distance.
  move = DOWN
  Swap: state[2] and state[5] → state[2] gets 3, state[5] gets 0.
  next_state = [1, 2, 3, 4, 5, 0, 7, 8, 6]

  Example 2 (3x3):
  State: [1, 2, 3, 4, 5, 6, 7, 0, 8]
  Grid:
   1  2  3
   4  5  6
   7  0  8
  Target: tile 8 (currently at index 8; goal index = 7).
  Blank is at index B=7. RIGHT neighbor = B+1 = 8. State[8] = tile 8. Swapping moves tile 8 left toward goal.
  move = RIGHT
  Swap: state[7] and state[8] → state[7] gets 8, state[8] gets 0.
  next_state = [1, 2, 3, 4, 5, 6, 7, 8, 0]

user_prompt: |
  Step: {step}
  State: {current_state}
  Previous: {previous_move}
  Grid:
  {state_visual}

  Fill in immediately (no preamble):
  Target: <lowest tile not at goal>
  move = <UP|DOWN|LEFT|RIGHT>
  next_state = [<all values 0–{max_tile} — state after swapping blank and its neighbor>]
  Reasoning: <one sentence>
