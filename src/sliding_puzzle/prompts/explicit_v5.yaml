system_prompt: |
  You are solving a {puzzle_name}-puzzle on a {n}x{n} grid.

  Goal State: {goal_list}
  Goal grid:
  {goal_viz}

  Index map (row-major order):
  {index_map}

  MOVES: UP/DOWN/LEFT/RIGHT — direction the BLANK (0) slides.
  Move = swap blank with its DIRECTLY adjacent (not diagonal) neighbor in that direction.

  Adjacency (straight lines only — NOT diagonal):
  - UP: blank at index B → swap with index (B - {n})   [same column, row above]
  - DOWN: blank at index B → swap with index (B + {n})  [same column, row below]
  - LEFT: blank at index B → swap with index (B - 1)   [same row, column left — ONLY if col > 0]
  - RIGHT: blank at index B → swap with index (B + 1)  [same row, column right — ONLY if col < {n}-1]

  Rules:
  1. Find lowest tile (1–{max_tile}) NOT at its goal index → Target.
  2. Locate the blank (0) in the current state → blank index B.
  3. If blank is DIRECTLY adjacent (UP/DOWN/LEFT/RIGHT) to Target AND swapping reduces Target's
     Manhattan distance to its goal → choose that direction.
  4. Otherwise move blank one step closer to Target (prefer moves not reversing previous move).
  5. Never displace a tile already at its goal index (index < Target).

  Output format — fill in EXACTLY these 5 lines:
  Target: <lowest tile not at goal>
  move = <UP|DOWN|LEFT|RIGHT>
  swap = [B, N]   (B = current blank index; N = neighbor index for that direction)
  next_state = [<all {size} values — current_state with positions B and N exchanged>]
  Reasoning: <one sentence>

  CRITICAL: next_state MUST equal current_state with ONLY positions B and N exchanged.
  Do NOT place tiles at goal positions. Copy all other positions unchanged.

  Example (3x3):
  State: [1, 2, 0, 4, 5, 3, 7, 8, 6]
  Grid:
   1  2  0
   4  5  3
   7  8  6
  Blank index B = 2. Target is tile 3 (at index 5; goal index = 3).
  DOWN from blank: N = B + 3 = 2 + 3 = 5. State[5] = 3 = Target. Reduces distance.
  Target: 3
  move = DOWN
  swap = [2, 5]
  next_state = [1, 2, 3, 4, 5, 0, 7, 8, 6]   ← positions 2 and 5 swapped: was [0,3] now [3,0]
  Reasoning: Blank at 2 moves DOWN to 5, placing tile 3 one step closer to goal index 3.

user_prompt: |
  Step: {step}
  State: {current_state}
  Previous: {previous_move}
  Grid:
  {state_visual}

  Fill in immediately (no preamble):
  Target: <lowest tile not at goal>
  move = <UP|DOWN|LEFT|RIGHT>
  swap = [B, N]
  next_state = [<all values 0–{max_tile}>]
  Reasoning: <one sentence>
