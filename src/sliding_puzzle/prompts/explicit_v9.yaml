system_prompt: |
  You are solving a {puzzle_name}-puzzle on a {n}x{n} grid.

  Goal State: {goal_list}
  Goal grid:
  {goal_viz}

  Index map (row-major order):
  {index_map}

  MOVES: UP/DOWN/LEFT/RIGHT — direction the BLANK (0) slides.
  Move = swap blank with its DIRECTLY adjacent neighbor in that direction.

  Adjacency (neighbor index N):
  - UP:    blank at index B → N = B - {n}   [valid ONLY if blank_row > 0]
  - DOWN:  blank at index B → N = B + {n}  [valid ONLY if blank_row < {n}-1]
  - LEFT:  blank at index B → N = B - 1   [valid ONLY if blank_col > 0]
  - RIGHT: blank at index B → N = B + 1  [valid ONLY if blank_col < {n}-1]

  Rules:
  1. Find lowest tile (1–{max_tile}) NOT at its goal index → Target.
  2. Find blank (0) in current state → blank_idx.
  3. Compute blank_row = blank_idx // {n}, blank_col = blank_idx % {n}.
  4. List ONLY valid moves: UP if blank_row>0; DOWN if blank_row<{n}-1; LEFT if blank_col>0; RIGHT if blank_col<{n}-1.
  5. ANTI-REVERSAL: If Previous_move is known, remove its opposite from Valid_moves (UP↔DOWN, LEFT↔RIGHT).
  6. A tile is "placed" if state[i] == goal[i] AND i < Target's goal index.
  7. For each move in Anti-reversal list, compute its neighbor index N_try = blank_idx + offset. Check if state[N_try] is a placed tile (its current index equals its goal index).
     - Tier-1 moves: moves that do NOT displace any placed tile → prefer these.
     - Tier-2 moves: moves that DO displace a placed tile → use only if Tier-1 is empty.
  8. From your chosen tier, pick the move that brings Target closer to its goal index (minimize Manhattan distance of Target after the swap). If Target is not adjacent to blank, pick the move that brings blank closer to Target.
  9. Compute N = neighbor index for chosen move direction.
  10. Look up tile_at_N = current_state[N].
  11. next_state = copy current_state, then set position blank_idx = tile_at_N, set position N = 0.

  Example (3x3) — easy case:
  State: [1, 2, 0, 4, 5, 3, 7, 8, 6]
  Grid:
   1  2  0
   4  5  3
   7  8  6
  Target: tile 3 (at index 5; goal index = 3).
  blank_idx: 2. blank_row = 2//3 = 0. blank_col = 2%3 = 2.
  Valid moves: DOWN, LEFT
  Anti-reversal: Previous=None → Remaining: DOWN, LEFT
  Placed tiles (index < goal_of_3=3, state[i]==goal[i]): index 0 (tile1==1✓), index 1 (tile2==2✓). Placed = {0,1}.
  DOWN: N_try=2+3=5, state[5]=3 (not placed). Tier-1 ✓
  LEFT: N_try=2-1=1, state[1]=2 (placed at index 1). Tier-2 ✗
  Tier-1 = [DOWN]. Choose DOWN: brings blank to index 5 where tile 3 is → Target moves to blank's old spot (index 2), dist reduces.
  move = DOWN
  N: 2 + 3 = 5
  tile_at_N: state[5] = 3
  next_state: copy [1, 2, 0, 4, 5, 3, 7, 8, 6], set index 2 = 3, set index 5 = 0 → [1, 2, 3, 4, 5, 0, 7, 8, 6]

  Example (3x3) — detour needed:
  State: [1, 2, 3, 0, 5, 6, 4, 7, 8]
  Grid:
   1  2  3
   0  5  6
   4  7  8
  Target: tile 4 (at index 6; goal index = 3).
  blank_idx: 3. blank_row=1. blank_col=0.
  Valid moves: UP, DOWN, RIGHT
  Anti-reversal: Previous=None → Remaining: UP, DOWN, RIGHT
  Placed tiles (index < goal_of_4=3, state[i]==i+1): index 0 (1==1✓), index 1 (2==2✓), index 2 (3==3✓). Placed = {0,1,2}.
  UP: N_try=3-3=0, state[0]=1 (placed). Tier-2 ✗
  DOWN: N_try=3+3=6, state[6]=4 (not placed). Tier-1 ✓
  RIGHT: N_try=3+1=4, state[4]=5 (not placed). Tier-1 ✓
  Tier-1 = [DOWN, RIGHT]. DOWN brings blank to index 6 (where tile 4 is) → tile 4 moves to index 3 (its goal!). ✓
  move = DOWN
  N: 3 + 3 = 6
  tile_at_N: state[6] = 4
  next_state: copy [1, 2, 3, 0, 5, 6, 4, 7, 8], set index 3 = 4, set index 6 = 0 → [1, 2, 3, 4, 5, 6, 0, 7, 8]

user_prompt: |
  Step: {step}
  State: {current_state}
  Previous: {previous_move}
  Grid:
  {state_visual}

  Fill in immediately (no preamble):
  Target: <lowest tile not at goal>
  blank_idx: <index of 0 in state>
  blank_row: <blank_idx // n>
  blank_col: <blank_idx % n>
  Valid_moves: <UP if blank_row>0; DOWN if blank_row<n-1; LEFT if blank_col>0; RIGHT if blank_col<n-1>
  Anti-reversal: <remove opposite of Previous from Valid_moves; list remaining>
  Tier-1: <from Anti-reversal, moves whose N_try has a non-placed tile; list them or NONE>
  move = <if Tier-1 non-empty: best from Tier-1; else best from Anti-reversal>
  N: <blank_idx + offset for chosen direction = exact integer>
  tile_at_N: <current_state[N] = exact tile value>
  next_state = [<copy current_state; replace index blank_idx with tile_at_N, replace index N with 0>]
